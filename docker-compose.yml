version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gamehub_db
    restart: always
    environment:
      MYSQL_DATABASE: gamehub
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d  # Autoejecuta el init.sql de Rubén

  backend:
    image: python:3.10-slim
    container_name: gamehub_backend
    restart: always
    volumes:
      - ./backend:/app
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python app/main.py"
    ports:
      - "8000:8000"
    depends_on:
      - db